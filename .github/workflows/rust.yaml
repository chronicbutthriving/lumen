#
# Configuration for GitHub-based CI, based on the stock GitHub Rust config.
#
---
name: Rust

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request: {}

jobs:
  check-style:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up toolchain
        uses: ./.github/actions/toolchain
      - name: Check style
        run: cargo fmt -- --check

  clippy-lint:
    runs-on: ubuntu-22.04
    env:
      CARGO_INCREMENTAL: 0
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up toolchain
        uses: ./.github/actions/toolchain
      - name: Run clippy lints
        run: cargo xtask clippy

  test:
    runs-on: ubuntu-22.04
    env:
      CARGO_INCREMENTAL: 0
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up toolchain
        uses: ./.github/actions/toolchain
      - name: Report Nextest version
        run: cargo nextest --version
      - name: Run tests
        run: cargo nextest run --workspace --all-features
